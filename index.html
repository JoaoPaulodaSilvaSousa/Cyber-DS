<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABELA DE CYBERS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="7fc27bb0-67ae-46a2-9d87-e512c18d2818.jpg" type="image/x-icon">
</head>
<body>
    
    <h1>BIG ALLY AM5</h1>

    <button id="toggle-theme">Alternar Tema</button>

    <table border="1" cellspacing="0" cellpadding="5">
        <tr>
            <th>MAPA</th>
            <th>RESPAWN GIGANTE (HR SERVER)</th>
            <th>RESPAWN BANDIDO (HR SERVER)</th>
            <th>HORA BRASIL GIGANTE</th>
            <th>HORA BRASIL BANDIDO</th>
        </tr>

        <tr>
            <td>GF</td>
            <td><input type="text" class="horasv" data-mapa="GF-gigante" placeholder="HH:MM:SS"></td>
            <td><input type="text" class="horasv" data-mapa="GF-bandido" placeholder="HH:MM:SS"></td>
            <td><input type="text" class="horabr" data-mapa="GF-gigante" readonly></td>
            <td><input type="text" class="horabr" data-mapa="GF-bandido" readonly></td>
        </tr>

        <tr>
            <td>MW</td>
            <td><input type="text" class="horasv" data-mapa="MW-gigante" placeholder="HH:MM:SS"></td>
            <td><input type="text" class="horasv" data-mapa="MW-bandido" placeholder="HH:MM:SS"></td>
            <td><input type="text" class="horabr" data-mapa="MW-gigante" readonly></td>
            <td><input type="text" class="horabr" data-mapa="MW-bandido" readonly></td>
        </tr>

        <tr>
            <td>GV</td>
            <td><input type="text" class="horasv" data-mapa="GV-gigante" placeholder="HH:MM:SS"></td>
            <td><input type="text" class="horasv" data-mapa="GV-bandido" placeholder="HH:MM:SS"></td>
            <td><input type="text" class="horabr" data-mapa="GV-gigante" readonly></td>
            <td><input type="text" class="horabr" data-mapa="GV-bandido" readonly></td>
        </tr>

        <tr>
            <td>CCV</td>
            <td><input type="text" class="horasv" data-mapa="CCV-gigante" placeholder="HH:MM:SS"></td>
            <td><input type="text" class="horasv" data-mapa="CCV-bandido" placeholder="HH:MM:SS"></td>
            <td><input type="text" class="horabr" data-mapa="CCV-gigante" readonly></td>
            <td><input type="text" class="horabr" data-mapa="CCV-bandido" readonly></td>
        </tr>

        <tr>
            <td>MM</td>
            <td><input type="text" class="horasv" data-mapa="MM-gigante" placeholder="HH:MM:SS"></td>
            <td><input type="text" class="horasv" data-mapa="MM-bandido" placeholder="HH:MM:SS"></td>
            <td><input type="text" class="horabr" data-mapa="MM-gigante" readonly></td>
            <td><input type="text" class="horabr" data-mapa="MM-bandido" readonly></td>
        </tr>
    </table>
    <script src="index.js"></script>
</body>
</html>
