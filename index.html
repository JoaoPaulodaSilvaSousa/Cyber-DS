<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABELA DE CYBERS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>BIG ALLY AM5</h1>

<div class="topo-container">
    <div id="relogio">00:00:00</div>
    <button id="toggle-alarm">🔔 Alarme: LIGADO</button>
    <button id="toggle-theme">Alternar Tema</button>
</div>

<table border="1" cellspacing="0" cellpadding="5">
    <tr>
        <th>MAPA</th>
        <th>MORTE GIGANTE (SERVER)</th>
        <th>MORTE BANDIDO (SERVER)</th>
        <th>RESPAWN GIGANTE (SERVER)</th>
        <th>RESPAWN GIGANTE (BR)</th>
        <th>RESPAWN BANDIDO (SERVER)</th>
        <th>RESPAWN BANDIDO (BR)</th>
    </tr>

    <tr>
        <td>GF</td>
        <td><input type="text" class="morteGigante" data-mapa="GF" placeholder="HH:MM:SS"></td>
        <td><input type="text" class="morteBandido" data-mapa="GF" placeholder="HH:MM:SS"></td>
        <td><input type="text" class="respGiganteServer" data-mapa="GF" readonly></td>
        <td><input type="text" class="respGiganteBR" data-mapa="GF" readonly></td>
        <td><input type="text" class="respBandidoServer" data-mapa="GF" readonly></td>
        <td><input type="text" class="respBandidoBR" data-mapa="GF" readonly></td>
    </tr>

    <tr>
        <td>MW</td>
        <td><input type="text" class="morteGigante" data-mapa="MW" placeholder="HH:MM:SS"></td>
        <td><input type="text" class="morteBandido" data-mapa="MW" placeholder="HH:MM:SS"></td>
        <td><input type="text" class="respGiganteServer" data-mapa="MW" readonly></td>
        <td><input type="text" class="respGiganteBR" data-mapa="MW" readonly></td>
        <td><input type="text" class="respBandidoServer" data-mapa="MW" readonly></td>
        <td><input type="text" class="respBandidoBR" data-mapa="MW" readonly></td>
    </tr>

    <tr>
        <td>GV</td>
        <td><input type="text" class="morteGigante" data-mapa="GV" placeholder="HH:MM:SS"></td>
        <td><input type="text" class="morteBandido" data-mapa="GV" placeholder="HH:MM:SS"></td>
        <td><input type="text" class="respGiganteServer" data-mapa="GV" readonly></td>
        <td><input type="text" class="respGiganteBR" data-mapa="GV" readonly></td>
        <td><input type="text" class="respBandidoServer" data-mapa="GV" readonly></td>
        <td><input type="text" class="respBandidoBR" data-mapa="GV" readonly></td>
    </tr>

    <tr>
        <td>CCV</td>
        <td><input type="text" class="morteGigante" data-mapa="CCV" placeholder="HH:MM:SS"></td>
        <td><input type="text" class="morteBandido" data-mapa="CCV" placeholder="HH:MM:SS"></td>
        <td><input type="text" class="respGiganteServer" data-mapa="CCV" readonly></td>
        <td><input type="text" class="respGiganteBR" data-mapa="CCV" readonly></td>
        <td><input type="text" class="respBandidoServer" data-mapa="CCV" readonly></td>
        <td><input type="text" class="respBandidoBR" data-mapa="CCV" readonly></td>
    </tr>

    <tr>
        <td>MM</td>
        <td><input type="text" class="morteGigante" data-mapa="MM" placeholder="HH:MM:SS"></td>
        <td><input type="text" class="morteBandido" data-mapa="MM" placeholder="HH:MM:SS"></td>
        <td><input type="text" class="respGiganteServer" data-mapa="MM" readonly></td>
        <td><input type="text" class="respGiganteBR" data-mapa="MM" readonly></td>
        <td><input type="text" class="respBandidoServer" data-mapa="MM" readonly></td>
        <td><input type="text" class="respBandidoBR" data-mapa="MM" readonly></td>
    </tr>
</table>

<script src="index.js"></script>
</body>
</html>
